# ═══════════════════════════════════════════════════════════════════════════
# Development Profile Configuration
# ═══════════════════════════════════════════════════════════════════════════

spring:
  jpa:
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
        generate_statistics: true

  devtools:
    restart:
      enabled: true
    livereload:
      enabled: true

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:noemail@example.com}
    password: ${MAIL_PASSWORD:nopassword}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000
          pool:
            enable: true
            max: 10

  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: read:user,user:email
            redirect-uri: "{baseUrl}/login/oauth2/code/github"

logging:
  level:
    root: INFO
    com.arjun.crm: DEBUG
    org.springframework.web: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.cache: DEBUG
    org.springframework.data.redis: DEBUG

server:
  error:
    include-stacktrace: always
    include-exception: true
  port: 8081
  address: 0.0.0.0

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true

cors:
  allowed-origins: "http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:8081,http://localhost:8082"
  allow-credentials: true

redis:
  enabled: true

app:
  mail:
    from: ${MAIL_USERNAME:noemail@example.com}
    from-name: "TaskFlow"
    default-timeout: 5000
