# ═══════════════════════════════════════════════════════════════════════════
# CRM Backend - Application Configuration
# Enterprise AI-Powered Task Manager + CRM + Collaboration Platform
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# Spring Application Configuration
# ───────────────────────────────────────────────────────────────────────────
spring:
  application:
    name: crm-backend
  
  # ─────────────────────────────────────────────────────────────────────────
  # OAuth2 Client Configuration (Google & GitHub)
  # ─────────────────────────────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: openid,profile,email
            redirect-uri: "{baseUrl}/login/oauth2/code/google"
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: read:user,user:email
            redirect-uri: "{baseUrl}/login/oauth2/code/github"

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  # ─────────────────────────────────────────────────────────────────────────
  # Database Configuration (PostgreSQL)
  # ─────────────────────────────────────────────────────────────────────────
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/crm_db}
    username: ${DATABASE_USERNAME:postgres}
    password: ${DATABASE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      pool-name: CRM-HikariPool

  # ─────────────────────────────────────────────────────────────────────────
  # JPA / Hibernate Configuration
  # ─────────────────────────────────────────────────────────────────────────
  jpa:
    hibernate:
      ddl-auto: ${HIBERNATE_DDL_AUTO:update}
    show-sql: ${JPA_SHOW_SQL:false}
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
        jdbc:
          batch_size: 20
        order_inserts: true
        order_updates: true
        generate_statistics: false
        cache:
          use_second_level_cache: false
          use_query_cache: false

  # ─────────────────────────────────────────────────────────────────────────
  # Redis Configuration
  # ─────────────────────────────────────────────────────────────────────────
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: ${REDIS_DATABASE:0}
      timeout: 60000
      ssl:
        enabled: ${REDIS_SSL:false}
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 2
          max-wait: -1ms
        shutdown-timeout: 100ms
    
    # ───────────────────────────────────────────────────────────────────────
    # Pagination Configuration
    # ───────────────────────────────────────────────────────────────────────
    web:
      pageable:
        default-page-size: ${DEFAULT_PAGE_SIZE:20}
        max-page-size: ${MAX_PAGE_SIZE:100}
        one-indexed-parameters: false

  # ─────────────────────────────────────────────────────────────────────────
  # Cache Configuration
  # ─────────────────────────────────────────────────────────────────────────
  cache:
    type: redis
    redis:
      time-to-live: 600000  # 10 minutes default
      cache-null-values: false
      use-key-prefix: true
      key-prefix: "crm:cache:"

  # ─────────────────────────────────────────────────────────────────────────
  # File Upload Configuration
  # ─────────────────────────────────────────────────────────────────────────
  servlet:
    multipart:
      enabled: true
      max-file-size: ${MAX_FILE_SIZE:10MB}
      max-request-size: ${MAX_REQUEST_SIZE:10MB}
      file-size-threshold: 2MB
      location: ${TEMP_UPLOAD_DIR:${java.io.tmpdir}}

  # ─────────────────────────────────────────────────────────────────────────
  # Async Task Execution Configuration
  # ─────────────────────────────────────────────────────────────────────────
  task:
    execution:
      pool:
        core-size: ${ASYNC_CORE_POOL_SIZE:5}
        max-size: ${ASYNC_MAX_POOL_SIZE:10}
        queue-capacity: ${ASYNC_QUEUE_CAPACITY:100}
        keep-alive: 60s
      thread-name-prefix: async-executor-
    
    # ───────────────────────────────────────────────────────────────────────
    # Scheduled Task Configuration
    # ───────────────────────────────────────────────────────────────────────
    scheduling:
      pool:
        size: ${SCHEDULER_POOL_SIZE:5}
      thread-name-prefix: scheduler-

  # ─────────────────────────────────────────────────────────────────────────
  # Jackson JSON Configuration
  # ─────────────────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
      fail-on-empty-beans: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC
    date-format: yyyy-MM-dd'T'HH:mm:ss.SSS'Z'

  # ─────────────────────────────────────────────────────────────────────────
  # Mail Configuration (Optional)
  # ─────────────────────────────────────────────────────────────────────────
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

  # ─────────────────────────────────────────────────────────────────────────
  # Pagination Configuration (merged with spring.data above)
  # ─────────────────────────────────────────────────────────────────────────
  # Moved to spring.data.web section above to avoid duplicate key

# ───────────────────────────────────────────────────────────────────────────
# Server Configuration
# ───────────────────────────────────────────────────────────────────────────
server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,application/javascript,text/css
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: on_param
    include-exception: false
  servlet:
    context-path: ${CONTEXT_PATH:}
    session:
      timeout: 30m

# ───────────────────────────────────────────────────────────────────────────
# Logging Configuration
# ───────────────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.arjun.crm: ${LOG_LEVEL:INFO}
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.hibernate.SQL: ${SQL_LOG_LEVEL:WARN}
    org.hibernate.type.descriptor.sql.BasicBinder: WARN
    org.springframework.cache: INFO
    org.springframework.data.redis: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/crm-backend.log}
    max-size: 10MB
    max-history: 30
    total-size-cap: 1GB

# ───────────────────────────────────────────────────────────────────────────
# Management & Actuator Configuration
# ───────────────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      probes:
        enabled: true
  metrics:
    export:
      prometheus:
        enabled: true
  health:
    redis:
      enabled: true
    db:
      enabled: true
    mail:
      enabled: false

# ═══════════════════════════════════════════════════════════════════════════
# Application-Specific Configuration
# ═══════════════════════════════════════════════════════════════════════════

# ───────────────────────────────────────────────────────────────────────────
# OAuth2 Configuration
# ───────────────────────────────────────────────────────────────────────────
oauth2:
  redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:3000/oauth2/callback}

# ───────────────────────────────────────────────────────────────────────────
# JWT Configuration
# ───────────────────────────────────────────────────────────────────────────
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}  # 24 hours in milliseconds
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days
  issuer: ${JWT_ISSUER:crm-backend}

# ───────────────────────────────────────────────────────────────────────────
# File Upload Configuration
# ───────────────────────────────────────────────────────────────────────────
file:
  upload:
    dir: ${UPLOAD_DIR:uploads/task-attachments}
    max-size: ${FILE_MAX_SIZE:10485760}  # 10MB in bytes
    allowed-extensions: jpg,jpeg,png,gif,pdf,doc,docx,xls,xlsx,txt,zip
    create-dir-if-not-exists: true

# ───────────────────────────────────────────────────────────────────────────
# AI Configuration (xAI)
# ───────────────────────────────────────────────────────────────────────────
ai:
  xai:
    api-key: ${XAI_API_KEY:}
    model: ${XAI_MODEL:grok-4.20-reasoning}
    base-url: ${XAI_BASE_URL:https://api.x.ai/v1/chat/completions}
    temperature: ${AI_TEMPERATURE:0.7}
    max-tokens: ${AI_MAX_TOKENS:1000}
    timeout: ${AI_TIMEOUT:30000}  # 30 seconds
    retry:
      max-attempts: ${AI_RETRY_MAX_ATTEMPTS:3}
      backoff-delay: ${AI_RETRY_BACKOFF:1000}  # 1 second
  cache:
    ttl: ${AI_CACHE_TTL:1800000}  # 30 minutes

# ───────────────────────────────────────────────────────────────────────────
# WebSocket Configuration
# ───────────────────────────────────────────────────────────────────────────
websocket:
  allowed-origins: ${WEBSOCKET_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:8080}
  stomp:
    broker:
      relay-host: ${STOMP_RELAY_HOST:}
      relay-port: ${STOMP_RELAY_PORT:61613}
      client-login: ${STOMP_CLIENT_LOGIN:guest}
      client-passcode: ${STOMP_CLIENT_PASSCODE:guest}
      use-external-broker: ${USE_EXTERNAL_BROKER:false}
    heartbeat:
      incoming: 10000
      outgoing: 10000

# ───────────────────────────────────────────────────────────────────────────
# CORS Configuration
# ───────────────────────────────────────────────────────────────────────────
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:3001,http://localhost:5173,http://localhost:8080}
  allowed-methods: ${CORS_ALLOWED_METHODS:GET,POST,PUT,PATCH,DELETE,OPTIONS}
  allowed-headers: ${CORS_ALLOWED_HEADERS:*}
  exposed-headers: ${CORS_EXPOSED_HEADERS:Authorization,Content-Type}
  allow-credentials: ${CORS_ALLOW_CREDENTIALS:true}
  max-age: ${CORS_MAX_AGE:3600}

# ───────────────────────────────────────────────────────────────────────────
# Cache Configuration (Custom TTLs)
# ───────────────────────────────────────────────────────────────────────────
cache:
  ttl:
    dashboard: 600000      # 10 minutes
    analytics: 600000      # 10 minutes
    ai-responses: 1800000  # 30 minutes
    user-profile: 3600000  # 1 hour
    notifications: 300000  # 5 minutes

# ───────────────────────────────────────────────────────────────────────────
# API Documentation (SpringDoc OpenAPI)
# ───────────────────────────────────────────────────────────────────────────
springdoc:
  api-docs:
    enabled: ${API_DOCS_ENABLED:true}
    path: /api-docs
  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
    display-request-duration: true
    doc-expansion: none
  show-actuator: false

# ───────────────────────────────────────────────────────────────────────────
# Application Info
# ───────────────────────────────────────────────────────────────────────────
info:
  app:
    name: ${spring.application.name}
    description: Enterprise AI-Powered Task Manager + CRM + Collaboration Platform
    version: 1.0.0
    encoding: ${project.build.sourceEncoding:UTF-8}
    java:
      version: ${java.version:21}
