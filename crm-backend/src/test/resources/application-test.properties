# ─── Test Application Configuration ─────────────────────────────────────────
spring.application.name=crm-backend-test
server.port=0

# ─── PostgreSQL (Testcontainers will override) ──────────────────────────────
spring.datasource.url=jdbc:tc:postgresql:15:///testdb
spring.datasource.driver-class-name=org.testcontainers.jdbc.ContainerDatabaseDriver
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# ─── Redis (Testcontainers will override) ───────────────────────────────────
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.cache.type=redis

# ─── Logging ─────────────────────────────────────────────────────────────────
logging.level.com.arjun.crm=INFO
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.testcontainers=INFO

# ─── JWT Configuration ───────────────────────────────────────────────────────
jwt.secret=testSecretKeyForJWTTokenGenerationInTestEnvironment1234567890
jwt.expiration=3600000

# ─── File Upload Configuration ───────────────────────────────────────────────
file.upload.dir=target/test-uploads
file.upload.max-size=10485760

# ─── Multipart File Upload ───────────────────────────────────────────────────
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true

# ─── Pagination ──────────────────────────────────────────────────────────────
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# ─── Scheduling (Disabled in tests) ─────────────────────────────────────────
spring.task.scheduling.pool.size=1

# ─── AI Configuration (Mock) ────────────────────────────────────────────────
ai.gemini.api-key=test-api-key
ai.gemini.api-url=http://localhost:8080/mock-ai
ai.gemini.temperature=0.7
ai.gemini.max-tokens=1000

# ─── Cache Configuration ─────────────────────────────────────────────────────
spring.cache.redis.time-to-live=60000
